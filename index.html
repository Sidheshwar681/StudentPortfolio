<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        nav{
            background:#0d6efd;
            padding:15px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:white;
        }

        nav ul{
            display:flex;
            list-style:none;
        }

        nav ul li{
            margin-left:25px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            transition:.3s;
        }

        nav ul li a:hover{
            color:#ffd700;
        }

        .hero{
            text-align:center;
            padding:120px 20px;
        }

        .hero h1{
            font-size:48px;
            color:#333;
        }

        .hero p{
            margin-top:20px;
            font-size:20px;
            color:#666;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 25px;
            background:#0d6efd;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#084298;
        }
    </style>
</head>
<body>

    <nav>
        <h2>Student Portfolio</h2>

        <ul>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Welcome to My Portfolio</h1>
        <p>Hello! I'm a student passionate about web development and technology.</p>

        <a href="profile.html" class="btn">View Profile</a>
    </section>

</body>
</html>
